<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="50%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4f46e5" />
      <stop offset="100%" stop-color="#818cf8" />
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#334155" stroke-width="0.7" opacity="0.3" />
    </pattern>
  </defs>
  <!-- Background -->
  <rect width="800" height="450" fill="url(#bgGrad)" />
  <!-- Grid Layer -->
  <rect width="800" height="450" fill="url(#grid)" />
  <!-- Abstract Design: Systems Architecture Concept -->
  <g transform="translate(100, 75)">
    <!-- Main Node (Database or Agent Core) -->
    <rect x="220" y="100" width="160" height="100" rx="8" fill="#1e1b4b" stroke="url(#accentGrad)" stroke-width="2" />
    <!-- Secondary Nodes -->
    <rect x="60" y="40" width="100" height="60" rx="6" fill="#0f172a" stroke="#475569" stroke-width="1.5" />
    <rect x="60" y="200" width="100" height="60" rx="6" fill="#0f172a" stroke="#475569" stroke-width="1.5" />
    <rect x="440" y="120" width="100" height="60" rx="6" fill="#0f172a" stroke="#475569" stroke-width="1.5" />
    <!-- Connectors -->
    <path d="M 160 70 L 220 120" stroke="#4f46e5" stroke-width="1.5" stroke-dasharray="4 4" fill="none" />
    <path d="M 160 230 L 220 180" stroke="#4f46e5" stroke-width="1.5" stroke-dasharray="4 4" fill="none" />
    <path d="M 380 150 L 440 150" stroke="#818cf8" stroke-width="2" fill="none" />
    <!-- Glowing Node Elements -->
    <circle cx="220" cy="120" r="4" fill="#818cf8" />
    <circle cx="220" cy="180" r="4" fill="#818cf8" />
    <circle cx="380" cy="150" r="4" fill="#818cf8" />
    <!-- Decorative Tech Text (Code Simulation) -->
    <text x="235" y="135" fill="#e2e8f0" font-family="monospace" font-size="12" font-weight="bold">SYSTEMS CORE</text>
    <text x="235" y="155" fill="#64748b" font-family="monospace" font-size="10">status: operational</text>
    <text x="235" y="175" fill="#818cf8" font-family="monospace" font-size="10">latency: 12ms</text>
    
    <text x="75" y="75" fill="#94a3b8" font-family="monospace" font-size="11">Agent_01</text>
    <text x="75" y="235" fill="#94a3b8" font-family="monospace" font-size="11">Agent_02</text>
    <text x="455" y="155" fill="#94a3b8" font-family="monospace" font-size="11">Client_API</text>
  </g>
  <!-- Foreground Subtle Framing -->
  <rect x="20" y="20" width="760" height="410" fill="none" stroke="#334155" stroke-width="1" opacity="0.5" />
  <!-- Corner Tech Elements -->
  <path d="M 15 30 L 15 15 L 30 15" stroke="#4f46e5" stroke-width="3" fill="none" />
  <path d="M 785 30 L 785 15 L 770 15" stroke="#4f46e5" stroke-width="3" fill="none" />
  <path d="M 15 420 L 15 435 L 30 435" stroke="#4f46e5" stroke-width="3" fill="none" />
  <path d="M 785 420 L 785 435 L 770 435" stroke="#4f46e5" stroke-width="3" fill="none" />
</svg>
