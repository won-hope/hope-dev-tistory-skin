<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <linearGradient id="avatarGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5" />
      <stop offset="100%" stop-color="#818cf8" />
    </linearGradient>
    <linearGradient id="innerGrad" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#312e81" />
      <stop offset="100%" stop-color="#4f46e5" />
    </linearGradient>
  </defs>
  <!-- Background Circle -->
  <circle cx="50" cy="50" r="48" fill="url(#avatarGrad)" />
  <!-- Inner Ring / Contrast -->
  <circle cx="50" cy="50" r="38" fill="url(#innerGrad)" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.15" />
  <!-- Minimalist Geometrical Systems/Agent Concept (Node and Orbit) -->
  <circle cx="50" cy="50" r="16" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-dasharray="4 2" />
  <circle cx="50" cy="50" r="6" fill="#ffffff" />
  <!-- Satellite Nodes -->
  <circle cx="50" cy="24" r="4" fill="#ffffff" />
  <circle cx="50" cy="76" r="4" fill="#ffffff" />
  <circle cx="26" cy="50" r="4" fill="#ffffff" />
  <circle cx="74" cy="50" r="4" fill="#ffffff" />
  <!-- Connecting Lines -->
  <line x1="50" y1="28" x2="50" y2="44" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" />
  <line x1="50" y1="56" x2="50" y2="72" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" />
  <line x1="28" y1="50" x2="44" y2="50" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" />
  <line x1="56" y1="50" x2="72" y2="50" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" />
</svg>
